<!DOCTYPE html>
<html>
<head>
  <title>Mobility and Temporality of the Device</title>
</head>
<body>
 <p id="deviceIntro"></p>

<h3>Where is your device used?</h3>

<label>
  <input type="radio" name="mobility" value="Stationary">
  <b>Stationary</b> — stays in one place (e.g., bed, bedroom, nightstand)
</label><br>

<label>
  <input type="radio" name="mobility" value="Context-specific Mobile">
  <b>Context-specific mobile</b> — user use it for an specific context ()
</label><br>

<label>
  <input type="radio" name="mobility" value="Freely Mobile">
  <b>Freely mobile</b> — user can use it across any place (home, work, travel)
</label><br>

<hr style="margin: 20px 0;">

<h3>How does your device operate?</h3>

<label>
  <input type="radio" name="timeUsage" value="Unspecified">
  <b>Unspecified</b> — the device does not clearly define when tracking starts
</label><br>

<label>
  <input type="radio" name="timeUsage" value="Automatic">
  <b>Automatic</b> — tracking happens without user action
</label><br>

<label>
  <input type="radio" name="timeUsage" value="Manual">
  <b>Manual</b> — user needs enable the sleep-tracking feature
</label><br>

<script>
 window.location.href = "self-inform.html";
</script>
</body>
</html>
